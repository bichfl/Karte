<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abenteuerkarte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fest auf die volle Bildschirmhöhe gesetzt */
            overflow: hidden; /* Verhindert doppelte Scrollbalken */
        }

        .header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0; /* Verhindert, dass der Header kleiner gestaucht wird */
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .map-wrapper {
            flex: 1; /* Nimmt automatisch den gesamten restlichen Platz ein */
            max-width: 1200px;
            width: 95%;
            margin: 25px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border: 1px solid #e0e0e0;
            display: flex; /* Zwingt das Iframe, sich nach innen auszudehnen */
        }

        iframe {
            width: 100%;
            height: 100%; /* Füllt den map-wrapper jetzt komplett in der Höhe aus */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Abenteuerkarte</h1>
    </div>

    <div class="map-wrapper">
        <iframe id="qgisKarte" src="export/index.html"></iframe>
    </div>

<script>
        // 1. Verhindert das Heranzoomen der WEBSITE durch Multi-Touch (Pinch-to-Zoom)
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // 2. Verhindert das Heranzoomen der WEBSITE durch Doppelklick/Doppeltippen
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 3. Korrigierte Iframe-Logik mit präzisem CSS für qgis2web-IDs
        document.getElementById('qgisKarte').addEventListener('load', function() {
            try {
                var iframeDoc = this.contentDocument || this.contentWindow.document;
                
                // CSS mit erhöhter Spezifität über IDs, um qgis2web-Standards zu überschreiben
                var kartenStyles = `
                    /* ---------------- LEFT SIDE CONTROLS (Gestapelt von unten nach oben) ---------------- */
                    
                    /* 1. Unterstes Element links: Die Lupe / Suchfunktion */
                    div[id^="ol-search"], .ol-search, .search-layer, .geocoder {
                        top: auto !important;
                        bottom: 20px !important;
                    }

                    /* 2. Darüber: Das Messwerkzeug (Lineal) */
                    div[id^="measure-control"], .ol-control.measure-control {
                        top: auto !important;
                        bottom: 65px !important;
                    }

                    /* 3. Darüber: Der Standort-Button (Geolocate) */
                    div[id^="geolocate-control"], .ol-control.geolocate-control {
                        top: auto !important;
                        bottom: 105px !important;
                    }

                    /* 4. Ganz oben in der linken Reihe: Die Standard Zoom-Tasten (+/-) */
                    .ol-zoom {
                        top: auto !important;
                        bottom: 145px !important;
                    }


                    /* ---------------- RIGHT SIDE CONTROLS ---------------- */

                    /* Layerauswahl (Layer Switcher) sauber nach unten rechts schieben */
                    div[id^="layer-switcher"], .layer-switcher, .ol-layer-switcher {
                        top: auto !important;
                        bottom: 50px !important; /* Etwas Platz über der QGIS-Attribution-Leiste lassen */
                    }
                `;
                
                var styleSheet = iframeDoc.createElement("style");
                styleSheet.innerText = kartenStyles;
                iframeDoc.head.appendChild(styleSheet);
                
                console.log("Karten-Elemente erfolgreich über IDs nach unten verschoben.");
            } catch (error) {
                console.error("Fehler beim Laden oder Modifizieren der Karte:", error);
            }
        });
</script>




</body>
</html>
