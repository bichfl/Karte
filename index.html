<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abenteuerkarte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }

        .header p {
            margin: 0;
            font-size: 14px;
            color: #bdc3c7;
        }

        .map-wrapper {
            flex: 1;
            max-width: 1200px;
            width: 95%;
            margin: 25px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border: 1px solid #e0e0e0;
        }


        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Abenteuerkarte</h1>
    </div>

    <div class="map-wrapper">
        <iframe id="qgisKarte" src="export/index.html"></iframe>
    </div>

    <script>
        document.getElementById('qgisKarte').addEventListener('load', function() {
            try {
			
                var iframeDoc = this.contentDocument || this.contentWindow.document;
                
                // Hier definierst du das CSS, das IN DIE KARTE eingeschleust wird
                var kartenStyles = `
                    /* --- Beispiel A: Zoom-Buttons anpassen --- */
                    .leaflet-control-zoom-in, 
                    .leaflet-control-zoom-out {
                        background-color: #2c3e50 !important; /* Passt zum Banner oben */
                        color: #ffffff !important;
                        border: none !important;
                    }
                    .leaflet-control-zoom-in:hover, 
                    .leaflet-control-zoom-out:hover {
                        background-color: #34495e !important;
                    }

                    /* --- Beispiel B: Schriftart der Popups ändern --- */
                    .leaflet-popup-content-wrapper {
                        font-family: 'Segoe UI', sans-serif !important;
                        border-radius: 8px !important;
                        box-shadow: 0 3px 10px rgba(0,0,0,0.2) !important;
                    }
                    .leaflet-popup-content {
                        font-size: 13px !important;
                        line-height: 1.5 !important;
                    }

                    /* --- Beispiel C: Scrollbalken in Popups schicker machen --- */
                    ::-webkit-scrollbar {
                        width: 6px;
                    }
                    ::-webkit-scrollbar-thumb {
                        background: #bdc3c7;
                        border-radius: 3px;
                    }
                `;
                
                // Erstelle ein Style-Element und füge es in das Iframe ein
                var styleSheet = iframeDoc.createElement("style");
                styleSheet.innerText = kartenStyles;
                iframeDoc.head.appendChild(styleSheet);
                
                console.log("Karten-Design erfolgreich angepasst.");
            } catch (error) {
                console.error("Design-Injektion fehlgeschlagen. Grund vermutlich Cross-Origin-Sperre im lokalen Test:", error);
            }
        });
    </script>

</body>
</html>
