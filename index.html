<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abenteuerkarte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fest auf die volle Bildschirmhöhe gesetzt */
            overflow: hidden; /* Verhindert doppelte Scrollbalken */
        }

        .header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0; /* Verhindert, dass der Header kleiner gestaucht wird */
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .map-wrapper {
            flex: 1; /* Nimmt automatisch den gesamten restlichen Platz ein */
            max-width: 1200px;
            width: 95%;
            margin: 25px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border: 1px solid #e0e0e0;
            display: flex; /* Zwingt das Iframe, sich nach innen auszudehnen */
        }

        iframe {
            width: 100%;
            height: 100%; /* Füllt den map-wrapper jetzt komplett in der Höhe aus */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Abenteuerkarte</h1>
    </div>

    <div class="map-wrapper">
        <iframe id="qgisKarte" src="export/index.html"></iframe>
    </div>

<script>
        // 1. Verhindert das Heranzoomen der WEBSITE durch Multi-Touch (Pinch-to-Zoom)
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // 2. Verhindert das Heranzoomen der WEBSITE durch Doppelklick/Doppeltippen
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 3. Korrigierte Iframe-Logik: Verschiebt die linke Toolbar als kompakte Einheit
        document.getElementById('qgisKarte').addEventListener('load', function() {
            try {
                var iframeDoc = this.contentDocument || this.contentWindow.document;
                
                var kartenStyles = `
                    /* Setzt den Haupt-Overlay-Container auf die volle Höhe des Iframes */
                    .ol-overlaycontainer-stopevent {
                        position: absolute !important;
                        top: 0 !important;
                        left: 0 !important;
                        width: 100% !important;
                        height: 100% !important;
                        pointer-events: none !important;
                    }

                    /* Macht Klicks auf die tatsächlichen Buttons wieder möglich */
                    .ol-overlaycontainer-stopevent > div, 
                    .ol-overlaycontainer-stopevent > button {
                        pointer-events: auto !important;
                    }

                    /* ---------------- LINKE SEITE (Kompakt als Einheit nach unten) ---------------- */
                    
                    /* 1. Verschiebt alle Standard-Buttons (Zoom, Geolocate, Measure) gemeinsam.
                       Das belässt die Icons in ihren Boxen und bewahrt die Abstände! */
                    .ol-zoom, .geolocate-control, .measure-control, div[id^="geolocate"], div[id^="measure"] {
                        position: absolute !important;
                        top: auto !important;
                        left: 12px !important;
                    }

                    /* Positionierung der einzelnen Elemente innerhalb der Standard-Optik */
                    .ol-zoom { bottom: 155px !important; }
                    .geolocate-control, div[id^="geolocate"] { bottom: 115px !important; }
                    .measure-control, div[id^="measure"] { bottom: 75px !important; }

                    /* 2. Die Lupe / Suchfunktion (wird passend unter der Toolbar platziert) */
                    .ol-search, .search-layer, .geocoder, div[id^="ol-search"] {
                        position: absolute !important;
                        top: auto !important;
                        left: 12px !important;
                        bottom: 20px !important;
                        margin: 0 !important;
                    }

                    /* Verhindert, dass qgis2web-Zusatzstyles das Layout links zerreißen */
                    .ol-control button {
                        display: block !important;
                        margin: 1px auto !important;
                    }


                    /* ---------------- RECHTE SEITE (Unverändert, da passend) ---------------- */

                    .layer-switcher, .ol-layer-switcher, div[id^="layer-switcher"] {
                        position: absolute !important;
                        top: auto !important;
                        right: 12px !important;
                        bottom: 45px !important;
                    }
                `;
                
                var styleSheet = iframeDoc.createElement("style");
                styleSheet.innerText = kartenStyles;
                iframeDoc.head.appendChild(styleSheet);
                
                console.log("Karten-Design links erfolgreich kompaktiert und Icons wiederhergestellt.");
            } catch (error) {
                console.error("Fehler beim Anpassen der linken Toolbar:", error);
            }
        });
</script>




</body>
</html>
