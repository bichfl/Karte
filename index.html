<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abenteuerkarte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .map-wrapper {
            flex: 1;
            max-width: 1200px;
            width: 95%;
            margin: 25px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border: 1px solid #e0e0e0;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Abenteuerkarte</h1>
    </div>

    <div class="map-wrapper">
        <iframe id="qgisKarte" src="export/index.html"></iframe>
    </div>

<script>
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        document.getElementById('qgisKarte').addEventListener('load', function() {
            try {
                var iframeDoc = this.contentDocument || this.contentWindow.document;
                
                var kartenStyles = `
                    .ol-overlaycontainer-stopevent {
                        position: absolute !important;
                        top: 0 !important;
                        left: 0 !important;
                        width: 100% !important;
                        height: 100% !important;
                        pointer-events: none !important;
                    }

                    .ol-overlaycontainer-stopevent > div, 
                    .ol-overlaycontainer-stopevent > button {
                        pointer-events: auto !important;
                    }

                    .layer-switcher, .ol-layer-switcher, div[id^="layer-switcher"] {
                        position: absolute !important;
                        top: auto !important;
                        right: 12px !important;
                        bottom: 45px !important;
                    }
                `;
                
                var styleSheet = iframeDoc.createElement("style");
                styleSheet.innerText = kartenStyles;
                iframeDoc.head.appendChild(styleSheet);
                
                console.log("Karten-Design links erfolgreich kompaktiert und Icons wiederhergestellt.");
            } catch (error) {
                console.error("Fehler beim Anpassen der linken Toolbar:", error);
            }
        });
</script>




</body>
</html>
